<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="裕民心安" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>裕民心安</title>
    <script src="%PUBLIC_URL%/owt.js" type="text/javascript"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div id="boot-fallback" style="display:none; padding:24px;">
      <h2 style="margin:0 0 12px;">页面未能正常启动</h2>
      <div style="line-height:1.6;">
        <div>如果你看到的是白屏，通常是运行环境/缓存导致的启动失败。</div>
        <div style="margin-top:8px;">你可以尝试：</div>
        <ul style="margin:8px 0 0 18px;">
          <li>关闭客户端后重新打开</li>
          <li>检查网络/代理/杀软是否拦截</li>
          <li>清理客户端缓存数据后再试</li>
        </ul>
        <div style="margin-top:12px;">
          <button id="boot-reload">刷新重试</button>
        </div>
        <pre id="boot-error" style="margin-top:12px; white-space:pre-wrap;"></pre>
      </div>
    </div>

    <script>
      (function () {
        // 启动看门狗：15 秒未标记启动成功，则显示兜底提示，避免纯白。
        var shown = false;
        function stringifyReason(reason) {
          try {
            if (reason === null || reason === undefined) return '';
            if (typeof reason === 'string') return reason;
            if (reason && reason.message) return String(reason.message);
            return JSON.stringify(reason);
          } catch (e) {
            return String(reason);
          }
        }
        function showFallback(msg) {
          // 应用已完成启动后，不再用“启动失败”遮罩打断正常使用
          if (window.__APP_BOOTSTRAPPED__) return;
          if (shown) return;
          shown = true;
          try {
            var el = document.getElementById('boot-fallback');
            if (!el) return;
            el.style.display = 'block';
            var errEl = document.getElementById('boot-error');
            if (errEl && msg) errEl.textContent = String(msg);
          } catch (e) {}
        }

        window.addEventListener('error', function (e) {
          if (window.__APP_BOOTSTRAPPED__) {
            try { console.error(e); } catch (err) {}
            return;
          }
          showFallback('window.onerror: ' + (e && e.message ? e.message : e));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var reason = e && e.reason ? e.reason : e;
          if (window.__APP_BOOTSTRAPPED__) {
            try { console.error('unhandledrejection', reason); } catch (err) {}
            return;
          }
          showFallback('unhandledrejection: ' + stringifyReason(reason));
        });

        var btn = document.getElementById('boot-reload');
        if (btn) btn.addEventListener('click', function () { location.reload(); });

        setTimeout(function () {
          if (window.__APP_BOOTSTRAPPED__) return;
          showFallback('启动超时：应用未在 15 秒内完成初始化');
        }, 15000);
      })();
    </script>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
